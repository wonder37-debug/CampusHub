name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - '.gitlab/frontend.yml'
      - '.gitlab-ci.yml'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.gitlab/frontend.yml'
      - '.gitlab-ci.yml'
      - '.github/workflows/frontend-ci.yml'

env:
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'
  NPM_CONFIG_PROGRESS: 'false'

jobs:
  static-check:
    name: Static Check (Type Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-online --no-audit --no-fund

      - name: Type check
        working-directory: frontend
        run: npm run type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-online --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
