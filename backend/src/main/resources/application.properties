spring.application.name=backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/campushub?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
# 使用占位符，默认密码是 root
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:init_schema.sql

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.campushub.backend.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 文件上传配置
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=32MB
app.upload.dir=uploads

# 默认激活 local 环境
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# 邮箱验证码配置
app.auth.allowed-email-domains=${APP_AUTH_ALLOWED_EMAIL_DOMAINS:edu.cn,example.edu.cn,campus.edu,test.edu.cn,nju.edu.cn,smail.nju.edu.cn}
app.mail.from=${APP_MAIL_FROM:}

# SMTP 配置模板
# 常见提供商：
# QQ 邮箱：smtp.qq.com / 465
# 163 邮箱：smtp.163.com / 465
# Gmail：smtp.gmail.com / 587
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.protocol=${SPRING_MAIL_PROTOCOL:smtp}
spring.mail.default-encoding=${SPRING_MAIL_DEFAULT_ENCODING:UTF-8}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}
