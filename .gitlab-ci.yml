workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

stages:
  - deps
  - static-check
  - unit-test
  - integration-test
  - build

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/frontend/.npm"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  fallback_keys:
    - "$CI_DEFAULT_BRANCH"
  paths:
    - .m2/repository/
    - frontend/.npm/
  policy: pull-push

include:
  - local: .gitlab/backend.yml
  - local: .gitlab/frontend.yml
