backend:verify:
  image: maven:3.9.9-eclipse-temurin-21
  stage: build
  timeout: 30m
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
    MAVEN_CLI_OPTS: "-B -ntp -s ../.gitlab/maven-settings.xml -Daether.connector.connectTimeout=30000 -Daether.connector.requestTimeout=120000 -Dmaven.wagon.rto=120000 -Dmaven.wagon.http.retryHandler.count=1"
    SPRING_PROFILES_ACTIVE: "default"
  before_script:
    - cd backend
    - mvn -version
  script:
    - printf "section_start:%s:backend_compile[collapsed=false]\r\e[0KBackend compile and dependency check\n" "$(date +%s)"
    - mvn $MAVEN_CLI_OPTS -DskipTests test-compile
    - printf "section_end:%s:backend_compile\r\e[0K\n" "$(date +%s)"
    - printf "section_start:%s:backend_unit_tests[collapsed=false]\r\e[0KBackend unit tests\n" "$(date +%s)"
    - mvn $MAVEN_CLI_OPTS -Dtest='*ServiceImplTest,RequestUserExtractorTest' test
    - printf "section_end:%s:backend_unit_tests\r\e[0K\n" "$(date +%s)"
    - printf "section_start:%s:backend_integration_tests[collapsed=false]\r\e[0KBackend integration tests\n" "$(date +%s)"
    - mvn $MAVEN_CLI_OPTS -Dtest=FrontendIntegrationFlowTest test
    - printf "section_end:%s:backend_integration_tests\r\e[0K\n" "$(date +%s)"
    - printf "section_start:%s:backend_package[collapsed=false]\r\e[0KBackend package\n" "$(date +%s)"
    - mvn $MAVEN_CLI_OPTS -DskipTests package
    - printf "section_end:%s:backend_package\r\e[0K\n" "$(date +%s)"
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
    paths:
      - backend/target/surefire-reports/
      - backend/target/*.jar
    expire_in: 7 days
  rules:
    - changes:
        - backend/**/*
        - .gitlab/backend.yml
        - .gitlab/maven-settings.xml
        - .gitlab-ci.yml
