.backend-template:
  image: maven:3.9.9-eclipse-temurin-21
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
    MAVEN_CLI_OPTS: "-B -ntp"
    SPRING_PROFILES_ACTIVE: "default"
  cache: []
  before_script:
    - cd backend

backend:dependencies:
  extends: .backend-template
  stage: deps
  script:
    - mvn $MAVEN_CLI_OPTS dependency:go-offline
  rules:
    - changes:
        - backend/**/*
        - .gitlab/backend.yml
        - .gitlab-ci.yml
    - when: manual
      allow_failure: true

backend:static-check:
  extends: .backend-template
  stage: static-check
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests compile
  rules:
    - changes:
        - backend/**/*
        - .gitlab/backend.yml
        - .gitlab-ci.yml

backend:unit-test:
  extends: .backend-template
  stage: unit-test
  timeout: 5m
  script:
    - timeout 4m mvn $MAVEN_CLI_OPTS -Dtest='*ServiceImplTest,RequestUserExtractorTest' test
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
    paths:
      - backend/target/surefire-reports/
    expire_in: 7 days
  rules:
    - changes:
        - backend/**/*
        - .gitlab/backend.yml
        - .gitlab-ci.yml

backend:integration-test:
  extends: .backend-template
  stage: integration-test
  timeout: 20m
  script:
    - mvn $MAVEN_CLI_OPTS -Dtest=FrontendIntegrationFlowTest test
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
    paths:
      - backend/target/surefire-reports/
    expire_in: 7 days
  rules:
    - changes:
        - backend/**/*
        - .gitlab/backend.yml
        - .gitlab-ci.yml

backend:build:
  extends: .backend-template
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    paths:
      - backend/target/*.jar
    expire_in: 7 days
  rules:
    - changes:
        - backend/**/*
        - .gitlab/backend.yml
        - .gitlab-ci.yml
