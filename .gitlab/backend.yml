backend:integration-test:
  extends: .backend-template
  stage: integration-test
  timeout: 25m
  script:
    - |
      set -u
      mkdir -p target/diagnostics
      echo "===== integration environment ====="
      date
      mvn -version
      nproc || true
      free -m || true
      df -h . /tmp || true
      echo "===== cgroup limits ====="
      for f in \
        /sys/fs/cgroup/memory.max \
        /sys/fs/cgroup/memory.current \
        /sys/fs/cgroup/memory.events \
        /sys/fs/cgroup/cpu.max \
        /sys/fs/cgroup/cpuset.cpus \
        /sys/fs/cgroup/memory/memory.limit_in_bytes \
        /sys/fs/cgroup/memory/memory.usage_in_bytes \
        /sys/fs/cgroup/memory/memory.failcnt; do
        if [ -f "$f" ]; then
          echo "$f=$(cat "$f")"
        fi
      done
      echo "===== compile and resolve test dependencies ====="
      COMPILE_CODE=0
      COMPILE_LOG="target/diagnostics/compile.log"
      timeout -k 30s 12m mvn $MAVEN_CLI_OPTS -DskipTests test-compile > "$COMPILE_LOG" 2>&1 || COMPILE_CODE="$?"
      if [ "$COMPILE_CODE" != "0" ]; then
        echo "===== compile log tail ====="
        tail -200 "$COMPILE_LOG" || true
        if [ "$COMPILE_CODE" = "137" ]; then
          echo "===== Maven dependency/compile step was killed by SIGKILL ====="
        fi
        echo "===== cgroup after compile failure ====="
        for f in /sys/fs/cgroup/memory.current /sys/fs/cgroup/memory.events /sys/fs/cgroup/memory/memory.usage_in_bytes /sys/fs/cgroup/memory/memory.failcnt; do
          if [ -f "$f" ]; then
            echo "$f=$(cat "$f")"
          fi
        done
        exit "$COMPILE_CODE"
      fi
      echo "===== compile and test dependency resolution completed ====="
      echo "===== starting integration test ====="
      WATCHDOG_LOG="target/diagnostics/watchdog.log"
      (
        diagnose_once() {
          TS="$(date +%s)"
          {
            echo "===== integration watchdog $TS ====="
            date
            free -m || true
            df -h . /tmp || true
            echo "===== cgroup watchdog ====="
            for f in /sys/fs/cgroup/memory.current /sys/fs/cgroup/memory.events /sys/fs/cgroup/memory/memory.usage_in_bytes /sys/fs/cgroup/memory/memory.failcnt; do
              if [ -f "$f" ]; then
                echo "$f=$(cat "$f")"
              fi
            done
            ps -eo pid,ppid,stat,pcpu,pmem,etime,args --sort=-pcpu | head -30 || true
          } >> "$WATCHDOG_LOG" 2>&1
        }
        diagnose_once
        while true; do
          sleep 15
          diagnose_once
        done
      ) &
      WATCHDOG_PID="$!"
      echo "===== watchdog started pid=$WATCHDOG_PID ====="
      CODE=0
      TEST_LOG="target/diagnostics/integration-test.log"
      timeout -k 30s 10m mvn $MAVEN_CLI_OPTS \
        "-Dtest=FrontendIntegrationFlowTest" \
        "-Dsurefire.timeout=360" \
        "-Dsurefire.forkedProcessTimeoutInSeconds=180" \
        "-Dsurefire.exitTimeout=30" \
        "-Dsurefire.useFile=false" \
        test > "$TEST_LOG" 2>&1 || CODE="$?"
      kill "$WATCHDOG_PID" 2>/dev/null || true
      echo "===== integration test log tail ====="
      tail -200 "$TEST_LOG" || true
      if [ "$CODE" = "137" ]; then
        echo "===== Maven was killed by SIGKILL, usually container memory or runner-level kill ====="
      fi
      echo "===== integration test finished code=$CODE ====="
      exit "$CODE"
  artifacts:
    when: always
    reports:
      junit:
        - backend/target/surefire-reports/TEST-*.xml
    paths:
      - backend/target/surefire-reports/
      - backend/target/diagnostics/
    expire_in: 7 days
  rules:
    - changes:
        - backend/**/*
        - .gitlab/backend.yml
        - .gitlab/maven-settings.xml
        - .gitlab-ci.yml

