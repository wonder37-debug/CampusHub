.backend-template:
  image: maven:3.9.9-eclipse-temurin-21

  variables:
    GIT_CLEAN_FLAGS: "-ffdx"
    MAVEN_CLI_OPTS: "-B -ntp -s ../.gitlab/maven-settings.xml -Dmaven.artifact.threads=1 -Daether.connector.connectTimeout=30000 -Daether.connector.requestTimeout=120000 -Dmaven.wagon.rto=120000 -Dmaven.wagon.http.retryHandler.count=1"
    SPRING_PROFILES_ACTIVE: "default"
    SPRING_AUTOCONFIGURE_EXCLUDE: "org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration"
    SPRING_MAIN_LAZY_INITIALIZATION: "true"
    APP_DEMO_DATA_ENABLED: "false"
    ARTIFACT_COMPRESSION_LEVEL: "fastest"
  before_script:
    - cd backend
    - export MAVEN_REPO_LOCAL="$CI_PROJECT_DIR/.m2/repository"
    - mkdir -p "$MAVEN_REPO_LOCAL"
    - export JAVA_TOOL_OPTIONS="-XX:ActiveProcessorCount=1 -XX:+UseSerialGC -Djava.security.egd=file:/dev/./urandom"
    - export MAVEN_OPTS="-Xmx256m -XX:+ExitOnOutOfMemoryError -Dmaven.repo.local=$MAVEN_REPO_LOCAL -Djava.security.egd=file:/dev/./urandom"
    - echo "Maven local repository $MAVEN_REPO_LOCAL"
    - mvn -version

