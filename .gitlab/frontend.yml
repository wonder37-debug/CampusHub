frontend:build:
  image: node:22
  stage: build
  timeout: 15m
  variables:
    ARTIFACT_COMPRESSION_LEVEL: "fastest"
  before_script:
    - cd frontend
    - npm ci --prefer-offline
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 7 days
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/frontend.yml
        - .gitlab-ci.yml
