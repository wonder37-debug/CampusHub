.frontend-template:
  image: node:22
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  before_script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline

frontend:dependencies:
  image: node:22
  stage: deps
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - frontend/.npm/
  script:
    - cd frontend
    - npm ci --cache .npm --prefer-offline
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/frontend.yml
        - .gitlab-ci.yml
    - when: manual
      allow_failure: true

frontend:static-check:
  extends: .frontend-template
  stage: static-check
  script:
    - npm run type-check
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/frontend.yml
        - .gitlab-ci.yml

frontend:build:
  extends: .frontend-template
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 7 days
  rules:
    - changes:
        - frontend/**/*
        - .gitlab/frontend.yml
        - .gitlab-ci.yml
